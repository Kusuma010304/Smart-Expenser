<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense-tracker</title>
    <style>
        body{
            background: linear-gradient(to right,rgb(52, 52, 53),rgb(111, 116, 65));
        }
        h1{
            text-align: center;
            color: aliceblue;
        }
        .summary{
            color: aliceblue;
           display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .card{
             border: 1px solid black;
             padding: 10px;
             justify-content: space-between;
             border-radius: 10px;
        }
        #addexpense{
            background-color: green;
            border-radius: 10px;
        }
        #id,#title,#amount,#category{
            border-radius: 10px;
            font-size: 20px;
        }
        .filters {
            margin-top: 20px;
            margin-bottom: 20px;
            text-align: center;
            border-radius: 10px;
        }
        .filter-btn {
            background-color: rgb(116, 116, 131);
            color: white;
            border: none;
            font-size: 25px;
            border-radius: 5px;
        }
         table {
            width: 100%;
            /* background: rgb(255, 255, 255); */
            border-collapse: collapse;
        }
        th,td {
            color: aliceblue;
            padding: 15px;
            border: 1px solid #161616; 
            text-align: center;
        }

    </style>
</head>

<body>
    <h1>Smart Expense Tracker</h1>
    <div class="summary">
    <div class="card">
        <h2>Total Expenses</h2>
        <h3 id="totalexpenses">0</h3>
    </div>
    <div class="card">
        <h2>Total Transactions</h2>
        <h3 id="totaltransactions">0</h3>
    </div>
    <div class="card">
        <h2>Highest Expenses</h2>
        <h3 id="highestexpenses">0</h3>
    </div>
    </div>
    <div class="card-container">
        <input type="number" id="id" placeholder="Enter id">
        <input type="text" id="title" placeholder="Enter title(ex:biryani,jean,bus)">
        <select id="category">
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
        </select>
        <input type="number" id="amount" placeholder="Enter amount">
        <button id="addexpense">ADD</button>
    </div>
    <div class="filters">
        <button class="filter-btn" onclick="filtercategory('All')">All</button>
        <button class="filter-btn" onclick="filtercategory('Food')">Food</button>
        <button class="filter-btn" onclick="filtercategory('Travel')">Travel</button>
        <button class="filter-btn" onclick="filtercategory('Shopping')">Shopping</button>
        <button class="filter-btn" onclick="filtercategory('Bills')">Bills</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>Title</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
    <script>
        let expenses = [];
        fetch("expenses.json")
            .then((response) => {
                return response.json();
            })
            .then((data) => {
                expenses = data;
                displayExpense(expenses);
                updateSummary();
            })
            .catch((error) => {
                console.log("Error:", error);
            });
        function displayExpense(data) {
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = "";
            data.forEach((expense) => {
                tbody.innerHTML +=
                    `
                    <tr>
                            <td>${expense.id}</td>
                            <td>${expense.title}</td>
                            <td>${expense.category}</td>
                            <td>${expense.amount}</td>
                             <td><button class="delete-btn" onclick="deleteExpense(${expense.id})"> Delete </button></td>
                   </tr>
                    `;
            });
        }
        document.getElementById("addexpense").addEventListener("click", addExpense);
        function addExpense() {
            const id = document.getElementById("id").value;
            const title = document.getElementById("title").value;
            const category = document.getElementById("category").value;
            const amount = document.getElementById("amount").value;
            const newExpense = {
                id: Number(id),
                title,
                category,
                amount: Number(amount)
            }
            expenses.push(newExpense);
            displayExpense(expenses);
            updateSummary();
            document.getElementById("title").value = "";
            document.getElementById("amount").value = "";
        }
        function filtercategory(category) {
            if (category === "All") {
                displayExpense(expenses);
                return;
            }
            const filteredExpenses =
                expenses.filter((item) => {
                    return item.category === category;
                });
            displayExpense(filteredExpenses);
        }
        function deleteExpense(id) {
            expenses = expenses.filter((item) => {
                return item.id !== id;
            });
            displayExpense(expenses);
            updateSummary();
        }
        function updateSummary() {
            const totalExpense =
                expenses.reduce((sum, item) => {
                    return sum + item.amount;
                }, 0);
            const highestExpense =
                expenses.reduce((max, item) => {
                    if (item.amount > max) {
                        return item.amount;
                    }
                    else {
                        return max;
                    }
                }, 0);
            const totalTransactions =expenses.length;
            document.getElementById("totalexpenses").innerText = "₹" + totalExpense;
            document.getElementById("totaltransactions").innerText = totalTransactions;
            document.getElementById("highestexpenses").innerText ="₹" + highestExpense;
        }
        function addMultipleExpenses(...newItems) {
            expenses.push(...newItems);
            displayExpense(expenses);
            updateSummary();
        }
        function report(currency) {
            console.log(currency);
            console.log(expenses);
        }
        const indianReport =
            report.bind(null, "₹");
            indianReport();
    </script>
</body>

</html>
